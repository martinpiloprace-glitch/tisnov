<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TS Tišnov - Monitor Sledování</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', sans-serif; }
        :root { --ts-blue: #0056a3; --ts-orange: #ff8800; --dark: #1e272e; }
        
        body { background: var(--dark); color: white; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1000px; background: #fff; height: 100vh; display: flex; flex-direction: column; color: #333; }

        /* HEADER */
        .top-bar { background: var(--ts-blue); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--ts-orange); }
        .mode-selector { display: flex; gap: 10px; }
        .m-btn { padding: 10px 20px; border-radius: 10px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .active-m { background: var(--ts-orange); color: white; }

        /* MAPA SIMULACE */
        .map-area { flex-grow: 1; background: #dfe6e9; position: relative; overflow: hidden; border-bottom: 2px solid #ccc; }
        .map-bg { position: absolute; width: 200%; height: 200%; background-image: 
            linear-gradient(#ccc 2px, transparent 2px), linear-gradient(90deg, #ccc 2px, transparent 2px);
            background-size: 100px 100px; transform: rotate(-15deg); top: -50%; left: -50%; }
        
        /* VOZIDLO NA MAPĚ */
        .vehicle { 
            position: absolute; width: 60px; height: 60px; 
            background: var(--ts-orange); border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.4); transition: 0.5s linear; z-index: 10;
        }
        .vehicle::after { content: ''; position: absolute; bottom: -10px; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 10px solid var(--ts-orange); }
        .v-label { font-size: 0.7rem; color: #000; background: rgba(255,255,255,0.8); padding: 2px 5px; border-radius: 5px; margin-top: 5px; font-weight: 900; }

        /* INFO PANEL */
        .info-panel { padding: 20px; background: #fff; box-shadow: 0 -10px 20px rgba(0,0,0,0.1); }
        .v-card { display: flex; align-items: center; gap: 20px; background: #f0f2f5; padding: 20px; border-radius: 20px; border-left: 10px solid var(--ts-orange); }
        .v-status { flex-grow: 1; }
        .v-status h3 { font-size: 1.5rem; color: var(--ts-blue); }
        .live-tag { background: #d63031; color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; animation: blink 1s infinite; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* ULICE TIŠNOVA (Simulace) */
        .street-name { position: absolute; font-size: 1.5rem; font-weight: 900; color: #999; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div>
            <h1>TS LIVE MONITORING</h1>
            <small>TIŠNOV A OKOLÍ</small>
        </div>
        <div class="mode-selector">
            <button id="btn-svoz" class="m-btn active-m" onclick="setMode('svoz')">Svoz</button>
            <button id="btn-zimni" class="m-btn" onclick="setMode('zimni')">Zimní</button>
        </div>
    </div>

    <div class="map-area">
        <div class="map-bg"></div>
        <div class="street-name" style="top: 20%; left: 30%;">Nám. Míru</div>
        <div class="street-name" style="top: 60%; left: 10%;">Brněnská</div>
        <div class="street-name" style="top: 40%; left: 60%;">Wagnerova</div>

        <div id="vuz" class="vehicle" style="top: 50%; left: 50%;">
            <span style="font-size: 1.5rem;" id="v-icon">🗑️</span>
            <div class="v-label" id="v-spz">7B2 4410</div>
        </div>
    </div>

    <div class="info-panel">
        <div class="v-card">
            <div class="v-status">
                <span class="live-tag">● LIVE GPS</span>
                <h3 id="v-name">KUKA VOZ - RAJÓN 1</h3>
                <p id="v-loc">Aktuálně: <b>ulice Mlýnská</b></p>
                <p>Rychlost: <b id="v-speed">12 km/h</b></p>
            </div>
            <div style="text-align: right;">
                <p style="font-size: 0.8rem;">Vytížení:</p>
                <progress id="v-load" value="65" max="100" style="width: 100px; accent-color: var(--ts-orange);"></progress>
            </div>
        </div>
    </div>
</div>

<script>
    let mode = 'svoz';
    const vuz = document.getElementById('vuz');
    
    // Simulace pohybu
    function moveVehicle() {
        const x = 20 + Math.random() * 60;
        const y = 20 + Math.random() * 60;
        vuz.style.left = x + '%';
        vuz.style.top = y + '%';
        
        document.getElementById('v-speed').innerText = Math.floor(5 + Math.random() * 25) + ' km/h';
    }

    setInterval(moveVehicle, 3000);

    function setMode(m) {
        mode = m;
        const btnS = document.getElementById('btn-svoz');
        const btnZ = document.getElementById('btn-zimni');
        const icon = document.getElementById('v-icon');
        const vName = document.getElementById('v-name');
        const vuzDiv = document.getElementById('vuz');

        if(m === 'svoz') {
            btnS.classList.add('active-m');
            btnZ.classList.remove('active-m');
            icon.innerText = '🗑️';
            vName.innerText = 'KUKA VOZ - RAJÓN 1';
            vuzDiv.style.background = 'var(--ts-orange)';
        } else {
            btnZ.classList.add('active-m');
            btnS.classList.remove('active-m');
            icon.innerText = '🚜';
            vName.innerText = 'SYPAČ / RADLICE - SEVER';
            vuzDiv.style.background = '#d63031'; // Červená pro zimní pohotovost
        }
    }
</script>
</body>
</html>
